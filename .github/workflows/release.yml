name: release

# Tag-triggered npm publish for the two public packages:
#   @urtela/pm-mcp-server  (packages/mcp-server)
#   @urtela/pm-integrator  (packages/integrator-ref)
#
# Each package publishes its esbuild bundle as its `bin` (the bundle inlines
# @pm/shared and all other deps), so the published tarballs have ZERO runtime
# dependencies.
#
# Publishing mechanism: npm **Trusted Publishing (OIDC)** — there is NO
# long-lived NPM_TOKEN. GitHub Actions mints a short-lived OIDC token (hence
# `id-token: write` below) that npm exchanges for publish rights, and
# `--provenance` attaches a verifiable build-provenance attestation.
#
# ── One-time manual setup before the first release ──────────────────────────
#   1. Register a Trusted Publisher for EACH package on npmjs.com
#      (Package → Settings → Trusted Publisher → GitHub Actions):
#         organization/owner: Apodus
#         repository:         project-management
#         workflow filename:  release.yml
#      Do this for both @urtela/pm-mcp-server and @urtela/pm-integrator.
#   2. npm trusted publishing can pre-register a package that does not exist
#      yet; however, if your npm account/CLI still requires it, the very FIRST
#      publish may need a one-time granular publish token. Verify against npm's
#      current Trusted Publishing docs when you go to publish.
#   3. Requires npm >= 11.5.1 for OIDC — this workflow upgrades npm via
#      `npm install -g npm@latest` before publishing.
#   4. Publish by pushing a version tag, e.g.:
#         git tag v0.1.0 && git push origin v0.1.0
# ────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # REQUIRED for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    name: build + publish to npm (OIDC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build MCP server bundle
        run: pnpm --filter @urtela/pm-mcp-server build

      - name: Build integrator bundle
        run: pnpm --filter @urtela/pm-integrator build && pnpm --filter @urtela/pm-integrator bundle

      - name: Upgrade npm for OIDC (Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Publish @urtela/pm-mcp-server
        run: npm publish --provenance --access public
        working-directory: packages/mcp-server

      - name: Publish @urtela/pm-integrator
        run: npm publish --provenance --access public
        working-directory: packages/integrator-ref
