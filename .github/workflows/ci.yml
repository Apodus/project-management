name: ci

# Structural guardrail: every push and PR must pass typecheck → lint →
# test → build. The unit/integration suite includes the integrator-ref
# merge-train tests (real git repos + worktrees), which are the slow tail —
# hence the generous job timeout.
#
# Turbo task graph note: `pnpm test` depends on `build` (turbo.json), so the
# suite runs against built packages; the trailing explicit `pnpm build` step
# is then a cache hit and exists to surface build errors as their own step.

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # ── Format check — DISABLED STUB (pre-existing drift) ───────────────
      # `pnpm format:check` fails on main today: 359 files are committed
      # wrapped at printWidth 80 while .prettierrc says 100 (the drift
      # predates this workflow — nothing enforces prettier at commit time;
      # lint-staged only runs secretlint). Enable this step in the SAME
      # change as a dedicated tree-wide `pnpm format` normalization commit,
      # after the in-flight campaigns land (a 359-file rewrite now would
      # conflict with every open branch).
      #
      # - name: Format check
      #   run: pnpm format:check

      # --concurrency=1 serializes the per-package turbo test tasks so the
      # integrator merge-train suite (real git worktrees, spawned verify
      # children, wall-clock-delayed verify commands in its E2E harnesses)
      # gets the 2-vCPU runner to itself instead of competing with the server
      # suite (70 files). Costs a few minutes of wall clock, buys timing
      # margin. Local `pnpm test` stays parallel. (pnpm passes script args
      # verbatim — no `--`, which would make turbo forward the flag into each
      # package's vitest invocation instead.)
      - name: Test
        run: pnpm test --concurrency=1

      - name: Build
        run: pnpm build

  # ── E2E job — enabled (phase-pin cleared by notes-campaign P4: E2E 20/20
  # green on main at 2359624). ──────────────────────────────────────────────
  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # non-blocking first week — flip to required after a week of green (vision §C1)
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
