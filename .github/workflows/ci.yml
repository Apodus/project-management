name: ci

# Structural guardrail: every push and PR must pass typecheck → lint →
# test → build. The unit/integration suite includes the integrator-ref
# merge-train tests (real git repos + worktrees), which are the slow tail —
# hence the generous job timeout.
#
# Turbo task graph note: `pnpm test` depends on `build` (turbo.json), so the
# suite runs against built packages; the trailing explicit `pnpm build` step
# is then a cache hit and exists to surface build errors as their own step.

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Format check — enforced. The tree was normalized tree-wide
      # (2026-06-15) and lint-staged now runs `prettier --write` on staged
      # files, so this stays green. `docs/` and `roadmaps/` are .prettierignored
      # (hand-authored prose, not code style).
      - name: Format check
        run: pnpm format:check

      # --concurrency=1 serializes the per-package turbo test tasks so the
      # integrator merge-train suite (real git worktrees, spawned verify
      # children, wall-clock-delayed verify commands in its E2E harnesses)
      # gets the 2-vCPU runner to itself instead of competing with the server
      # suite (70 files). Costs a few minutes of wall clock, buys timing
      # margin. Local `pnpm test` stays parallel. (pnpm passes script args
      # verbatim — no `--`, which would make turbo forward the flag into each
      # package's vitest invocation instead.)
      - name: Test
        run: pnpm test --concurrency=1

      - name: Build
        run: pnpm build

  # ── E2E job — REQUIRED. The suite is green (spec 01 is a Playwright setup
  # dependency that seeds the admin, so 02-09 are order-independent) and CI
  # runs with retries: 2 to absorb the load-sensitive flake on the slowest
  # claims-surface spec. ─────────────────────────────────────────────────────
  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
